<script type="module">
    const diagrams = document.querySelectorAll(".mermaid");

    if (diagrams.length > 0) {
        try {
            const { default: mermaid } = await import("/vendor/mermaid/mermaid-11.16.0.min.mjs");

            mermaid.initialize({
                startOnLoad: false,
                securityLevel: "strict",
                theme: document.body.classList.contains("dark") ? "dark" : "default"
            });
            await mermaid.run({ nodes: diagrams });
        } catch (error) {
            console.error("Mermaid rendering failed; showing diagram source instead.", error);
            diagrams.forEach((diagram) => {
                diagram.classList.add("mermaid-fallback");
                diagram.setAttribute("title", "Diagram rendering unavailable; showing Mermaid source");
            });
        }
    }
</script>
